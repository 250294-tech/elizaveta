<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // ТВОИ ДАННЫЕ
    const URL = "https://jocrggurfkljvpsgsdem.supabase.co"; 
    const KEY = "jocrggurfkljvpsgsdem"; 
    const MY_ID = "f858c516-eb14-4d69-a945-cc2e27fe2a5b"; 

    const supabase = createClient(URL, KEY);

    window.changeStatus = async (text, color) => {
        const { error } = await supabase
            .from('profiles')
            .update({ status: text, avatar_url: color })
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка! Проверь RLS политики в Supabase.");
            console.error(error);
        } else {
            location.reload(); // Перезагрузит страницу, чтобы увидеть новый статус
        }
    };
</script>
