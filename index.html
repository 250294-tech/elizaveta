<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .post { background: #fff; border: 1px solid #eeeeee; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f0f2f5; padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Отправить заявку</h3>
        <input type="text" id="name" placeholder="Ваше имя">
        <input type="email" id="email" placeholder="Ваш Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBh4ixnhUV8Gaz3_vnyf0sQRhk4wxRKljE",
            authDomain: "elizaveta-b07f8.firebaseapp.com",
            projectId: "elizaveta-b07f8",
            storageBucket: "elizaveta-b07f8.appspot.com",
            messagingSenderId: "365851603565",
            appId: "1:365851603565:web:537d95a5f279f061d4b684",
            measurementId: "G-PX8NTGPFGY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ВАЖНО ДЛЯ ТЕСТА: Делаем базу видимой для консоли
        window.db = db;

        // Функция лайка (выносим в window, чтобы работала из HTML)
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Ошибка:", e.message);
            }
        };

        // Логика кнопки отправки
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            if(!name || !email) return alert("Заполните поля!");

            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                document.getElementById('name').value = "";
                document.getElementById('email').value = "";
            } catch (e) {
                alert("Ошибка безопасности: " + e.message);
            }
        };

        // Real-time лента
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
