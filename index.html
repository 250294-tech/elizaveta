<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS Premium App</title>
    <style>
        :root {
            --main-purple: #9c27b0;
            --light-purple: #f3e5f5;
            --dark-purple: #4a148c;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            margin: 0; padding-top: 80px; /* Отступ под шапку */
            display: flex; flex-direction: column; align-items: center;
            color: var(--dark-purple); min-height: 100vh;
        }

        /* Шапка приложения */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 65px;
            background: var(--glass); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--main-purple); letter-spacing: 1px; }

        .auth-trigger {
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            padding: 5px 12px; border-radius: 30px; transition: 0.3s;
            border: 1px solid var(--light-purple); background: white;
        }
        .auth-trigger:hover { background: var(--light-purple); }
        
        .avatar-circle {
            width: 35px; height: 35px; border-radius: 50%; 
            background: #eee; border: 2px solid var(--main-purple);
            object-fit: cover;
        }

        /* Контейнеры */
        .container {
            width: 90%; max-width: 500px; background: var(--glass);
            padding: 25px; border-radius: 24px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.15);
            box-sizing: border-box; border: 1px solid rgba(255,255,255,0.4);
        }

        .leaders-grid { display: flex; justify-content: space-around; margin-top: 15px; }
        .leader-card { text-align: center; font-size: 13px; flex: 1; }
        .rank-icon { font-size: 24px; margin-bottom: 5px; display: block; }

        input[type="text"], input[type="email"] {
            width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee;
            border-radius: 15px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--main-purple); background: #fff; }

        .btn-send {
            background: linear-gradient(45deg, var(--main-purple), var(--dark-purple));
            color: white; border: none; padding: 15px; border-radius: 15px;
            width: 100%; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
        }

        /* Посты */
        .post {
            background: white; border-radius: 20px; padding: 20px; margin-top: 15px;
            width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 6px solid var(--main-purple); box-sizing: border-box;
        }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 12px; }
        .like-btn {
            background: #fdf5ff; border: 1px solid var(--light-purple);
            padding: 8px 18px; border-radius: 20px; color: var(--main-purple);
            font-weight: bold; cursor: pointer; margin-top: 12px;
        }

        #logoutBtn { color: #ff5252; background: none; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="logo">CLOUD.APP</div>
    <div id="authContent">
        <div id="loginBtn" class="auth-trigger">
            <span>Войти</span>
            <div class="avatar-circle" style="display: flex; align-items: center; justify-content: center; font-size: 18px;">?</div>
        </div>
        <div id="userProfile" class="auth-trigger" style="display: none;">
            <span id="headerUserName">...</span>
            <img id="headerAvatar" class="avatar-circle" src="">
        </div>
    </div>
</header>

<div class="container leaders-panel">
    <center><strong>&#127942; ЗАЛ СЛАВЫ</strong></center>
    <div id="leadersList" class="leaders-grid">Загрузка...</div>
</div>

<div class="container" id="publishForm" style="display: none;">
    <h3 style="margin-top: 0;">&#9997; Создать запись</h3>
    <input type="text" id="name" placeholder="Имя" readonly>
    <input type="text" id="postContent" placeholder="Напишите что-нибудь...">
    <input type="file" id="imageInput" accept="image/*" style="font-size: 12px; margin-bottom: 10px;">
    <button id="mainBtn" class="btn-send">ОПУБЛИКОВАТЬ</button>
    <center><button id="logoutBtn" style="margin-top: 15px;">Выйти из аккаунта</button></center>
</div>

<div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBh4ixnhUV8Gaz3_vnyf0sQRhk4wxRKljE",
        authDomain: "elizaveta-b07f8.firebaseapp.com",
        projectId: "elizaveta-b07f8",
        storageBucket: "elizaveta-b07f8.appspot.com",
        messagingSenderId: "365851603565",
        appId: "1:365851603565:web:537d95a5f279f061d4b684"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Элементы
    const loginBtn = document.getElementById('loginBtn');
    const userProfile = document.getElementById('userProfile');
    const publishForm = document.getElementById('publishForm');
    const logoutBtn = document.getElementById('logoutBtn');

    // Авторизация
    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginBtn.style.display = 'none';
            userProfile.style.display = 'flex';
            publishForm.style.display = 'block';
            document.getElementById('headerAvatar').src = user.photoURL;
            document.getElementById('headerUserName').innerText = user.displayName.split(' ')[0];
            document.getElementById('name').value = user.displayName;
        } else {
            loginBtn.style.display = 'flex';
            userProfile.style.display = 'none';
            publishForm.style.display = 'none';
        }
    });

    const toBase64 = file => new Promise((res, rej) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => res(reader.result);
        reader.onerror = e => rej(e);
    });

    // Отправка
    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('postContent').value;
        const file = document.getElementById('imageInput').files[0];
        if(!text && !file) return;

        let img = null;
        if(file) {
            if(file.size > 700000) return alert("Фото слишком большое!");
            img = await toBase64(file);
        }

        await addDoc(collection(db, "requests"), {
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            text: text,
            image: img,
            likes: 0,
            timestamp: serverTimestamp()
        });
        document.getElementById('postContent').value = "";
        document.getElementById('imageInput').value = "";
    };

    // Зал славы
    onSnapshot(query(collection(db, "requests"), orderBy("likes", "desc"), limit(3)), (snap) => {
        const list = document.getElementById('leadersList');
        list.innerHTML = "";
        let r = 1;
        const icons = ['&#129351;', '&#129352;', '&#129353;'];
        snap.forEach(d => {
            list.innerHTML += `<div class="leader-card"><span class="rank-icon">${icons[r-1]}</span><b>${d.data().name.split(' ')[0]}</b><br>❤️ ${d.data().likes || 0}</div>`;
            r++;
        });
    });

    // Лента
    onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
            feed.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <img src="${data.photo}" class="avatar-circle" style="width:30px; height:30px;">
                        <div style="flex:1">
                            <div style="font-weight:bold; font-size:14px;">${data.name}</div>
                            <div style="font-size:10px; color:gray;">${time}</div>
                        </div>
                    </div>
                    <div style="font-size:15px; line-height:1.4;">${data.text || ""}</div>
                    ${data.image ? `<img src="${data.image}" class="post-img">` : ""}
                    <button class="like-btn" onclick="updateDoc(doc(db,'requests','${d.id}'),{likes:increment(1)})">&#128077; ${data.likes || 0}</button>
                </div>`;
        });
    });
</script>
</body>
</html>
